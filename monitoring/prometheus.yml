global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'ticket-booking'
    environment: 'development'

alerting:
  alertmanagers:
    - static_configs:
        - targets: []

rule_files: []

scrape_configs:
  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # API Service Metrics
  - job_name: 'api'
    static_configs:
      - targets: ['api:8081']
    metrics_path: '/metrics'
    scrape_interval: 10s

  # Worker Service Metrics
  - job_name: 'worker'
    static_configs:
      - targets: ['worker:8082']
    metrics_path: '/metrics'
    scrape_interval: 10s

  # Redis Exporter
  - job_name: 'redis'
    static_configs:
      - targets: ['redis-exporter:9121']

  # PostgreSQL Exporter
  - job_name: 'postgres'
    static_configs:
      - targets: ['postgres-exporter:9187']

  # Node Exporter (system metrics)
  - job_name: 'node'
    static_configs:
      - targets: ['node-exporter:9100']

